# 1교시 비교 데모 정의 (docs/lecture-notes.md 30~33줄 기준)
# train.py 가 이 파일을 읽어 각 비교군 모델을 학습 -> weights/<name>.pt 로 저장.
# 공통 베이스는 base 에, 비교군별로 덮어쓸 값만 groups 에 적는다.

base:
  data: screw          # 결함이 작고 다양 -> 난이도 있는 현실적 예시 (불량 119장, train 풀 124)
  epochs: 100          # 소규모 데이터라 충분히 수렴시킴
  imgsz: 640
  model: yolo11s.pt     # 기본 백본

groups:
  # B(1순위): 증강 없음 vs 있음 — "틀린 이미지를 증강 모델로 다시 추론하면 맞음"
  - name: noaug
    augment: false
  - name: aug
    augment: true

  # A: 데이터 양 10/50/100장 — 중간 단계 포함해 "데이터가 성능을 가른다" 곡선으로
  - name: n10
    max_train_images: 10
  - name: n50
    max_train_images: 50
  - name: n100
    max_train_images: 100

  # C: 모델 크기 n/s/m/l 전부 — 속도 vs 정확도 (2교시 복선)
  # 's' 지점은 noaug(yolo11s, 풀데이터, 증강없음)와 동일 조건이라 보고서에서 noaug 를 재사용.
  - name: size_n
    model: yolo11n.pt
  - name: size_m
    model: yolo11m.pt
  - name: size_l
    model: yolo11l.pt
